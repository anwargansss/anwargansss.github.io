<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Day Challenge | Professional Self-Dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .active-page { display: block; }
        body { transition: background 0.3s, color 0.3s; font-family: 'Inter', sans-serif; }
        .dark-mode { background-color: #0f172a !important; color: #ffffff !important; }
        .dark-mode .bg-white { background-color: #1e293b !important; color: #ffffff !important; border-color: #334155 !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="fixed w-full z-50 bg-white border-b px-6 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <img src="logo.png" class="h-12 w-12 object-contain" alt="Logo">
            <span class="font-bold text-lg text-blue-600">Day Challenge</span>
        </div>
        <div class="flex gap-4 font-medium text-sm">
            <button onclick="showPage('dashboard')">Home</button>
            <button onclick="showPage('challenge')">Challenge</button>
            <button onclick="showPage('leaderboard')">Leaderboard</button>
            <button onclick="showPage('settings')">Settings</button>
            <button onclick="toggleDarkMode()" class="ml-2">🌙</button>
        </div>
    </nav>

    <main class="pt-24 px-6 pb-10">
        
        <div id="dashboard" class="page active-page">
            <h1 class="text-2xl font-bold mb-4">Halo, Naswa! 👋</h1>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border">Poin: <span class="font-bold text-blue-600">160</span></div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border">Streak: <span class="font-bold text-orange-500">5 Hari</span></div>
            </div>
        </div>

        <div id="challenge" class="page">
            <h1 class="text-2xl font-bold mb-4">Daily Challenge</h1>
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <h2 class="font-bold">Public Speaking</h2>
                <div class="aspect-video bg-black mt-4 rounded-xl"></div>
                <button onclick="alert('Challenge Selesai!')" class="mt-4 w-full bg-blue-600 text-white py-2 rounded-xl">Klaim Poin</button>
            </div>
        </div>

        <div id="leaderboard" class="page">
            <h1 class="text-2xl font-bold mb-4">Leaderboard</h1>
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <p>1. Salma - 1250 Pts</p>
                <p>2. Naswa - 160 Pts</p>
            </div>
        </div>

        <div id="settings" class="page">
            <h1 class="text-2xl font-bold mb-4">Settings</h1>
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <input type="text" placeholder="Username Baru" class="w-full p-2 border rounded-lg mb-4 text-slate-900">
                <button class="bg-blue-600 text-white px-6 py-2 rounded-lg">Simpan</button>
            </div>
        </div>
    </main>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
        }
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }
        window.onload = () => {
            if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
