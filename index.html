<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Day Challenge</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white text-slate-800">
    <div id="root"></div>

    <!-- React & ReactDOM -->
    <script type="module">
        import React from 'https://esm.sh/react';
        import ReactDOM from 'https://esm.sh/react-dom/client';
        import htm from 'https://esm.sh/htm';

        const html = htm.bind(React.createElement);

        function WebDayChallenge() {
            const users = ['Salma', 'Rafiqoh', 'Nurul', 'Anargya', 'Almira', 'Putri', 'Putra', 'Aji', 'Ilham', 'Aninda', 'Nathania'];
            const challenges = [
                { title: 'Morning Workout', category: 'Health & Fitness', difficulty: 'Medium', progress: 70, reward: 50, duration: '20 Menit', premium: false, video: 'https://www.youtube.com/embed/pi5WhX24uS4' },
                { title: 'Gratitude Journal', category: 'Journaling', difficulty: 'Easy', progress: 45, reward: 30, duration: '10 Menit', premium: true, video: 'https://www.youtube.com/embed/xFYJk1hsJaU' },
                { title: 'Public Speaking Practice', category: 'Self Improvement', difficulty: 'Hard', progress: 25, reward: 80, duration: '30 Menit', premium: true, video: 'https://www.youtube.com/embed/-2NnNomW68k' }
            ];
            const leaderboard = [
                { name: 'Salma', points: 1250, badge: 'Legend', level: 20 },
                { name: 'Ilham', points: 920, badge: 'Master', level: 16 },
                { name: 'Putri', points: 710, badge: 'Warrior', level: 12 },
                { name: 'Nurul', points: 500, badge: 'Challenger', level: 9 }
            ];
            const features = ['AI Reminder', 'Progress Partner', 'Daily Challenge', 'Journaling', 'Leaderboard', 'Reward Point', 'Premium Access', 'Community Support'];

            return html`
                <div class="min-h-screen bg-white text-slate-800 font-sans">
                    <nav class="sticky top-0 z-50 backdrop-blur bg-white/80 border-b border-slate-100">
                        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-blue-500 to-orange-400 flex items-center justify-center text-white font-bold shadow-lg">WD</div>
                                <div>
                                    <h1 class="font-bold text-lg">Web Day Challenge</h1>
                                    <p class="text-xs text-slate-500">AI Self Development Platform</p>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <section class="max-w-7xl mx-auto px-6 py-20 grid lg:grid-cols-2 gap-14 items-center">
                        <div>
                            <div class="inline-flex items-center gap-2 bg-blue-50 border border-blue-100 px-4 py-2 rounded-full text-blue-700 text-sm mb-6">🚀 Gamification Platform</div>
                            <h1 class="text-5xl md:text-6xl font-black leading-tight tracking-tight">Transform Your <span class="text-blue-600">Habits</span></h1>
                            <p class="text-slate-500 text-lg mt-6">Platform self development interaktif berbasis AI.</p>
                        </div>
                        <div class="relative bg-white rounded-[40px] border border-slate-100 shadow-2xl p-8">
                            <h3 class="font-bold text-xl mb-4">Daily Progress</h3>
                            <div class="space-y-4">
                                ${challenges.map(c => html`
                                    <div class="bg-slate-50 rounded-3xl p-4">
                                        <div class="flex justify-between font-bold">${c.title}<span>${c.progress}%</span></div>
                                        <div class="h-2 bg-slate-200 rounded-full mt-2"><div class="h-full bg-blue-500 rounded-full" style="width: ${c.progress}%"></div></div>
                                    </div>
                                `)}
                            </div>
                        </div>
                    </section>

                    <section class="max-w-7xl mx-auto px-6 py-10">
                        <h2 class="text-4xl font-black text-center mb-10">Fitur Utama</h2>
                        <div class="grid md:grid-cols-4 gap-6">
                            ${features.map(f => html`<div class="bg-white border p-6 rounded-3xl shadow-sm text-center font-bold text-lg">${f}</div>`)}
                        </div>
                    </section>
                </div>
            `;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(WebDayChallenge));
    </script>
</body>
</html>
