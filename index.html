<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Day Challenge | Grow Every Day</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s; }
        .hidden-section { display: none; }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-md border-b px-8 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2 font-bold text-xl text-blue-600">
            <img src="logo.png" alt="Logo" class="h-10"> Day Challenge
        </div>
        <div class="flex gap-6 font-semibold">
            <button onclick="showSection('landing')" class="hover:text-blue-600">Home</button>
            <button onclick="showSection('dashboard')" class="hover:text-blue-600">Dashboard</button>
        </div>
    </nav>

    <main class="pt-24 px-4 pb-20 max-w-5xl mx-auto">
        <section id="landing" class="text-center py-20">
            <h1 class="text-6xl font-extrabold mb-6">Transform Your Habits<br><span class="text-blue-600">Into Challenges</span></h1>
            <button onclick="showSection('dashboard')" class="bg-orange-500 text-white px-8 py-4 rounded-xl font-bold shadow-lg">Mulai Challenge Sekarang</button>
        </section>

        <section id="dashboard" class="hidden-section space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border text-center">
                    <p class="text-gray-500 text-sm">Total Poin</p>
                    <h3 id="userPoints" class="text-3xl font-bold text-blue-600">160</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border text-center">
                    <p class="text-gray-500 text-sm">Streak</p>
                    <h3 class="text-3xl font-bold text-orange-500">0 Hari</h3>
                </div>
                <div class="bg-gradient-to-r from-blue-600 to-orange-500 p-6 rounded-3xl text-white">
                    <h3 class="font-bold">Upgrade Premium</h3>
                    <p class="text-xs opacity-80 mb-2">Rp 20.000/bulan</p>
                    <button class="bg-white text-blue-600 px-4 py-1 rounded-lg text-sm font-bold">Beli</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-8 rounded-3xl shadow-sm border">
                    <h2 class="text-xl font-bold mb-4">Today's Challenge</h2>
                    <div class="bg-gray-50 p-4 rounded-2xl flex justify-between items-center">
                        <span>Latihan Public Speaking</span>
                        <button onclick="alert('Poin Ditambahkan!')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm">Selesaikan</button>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-3xl shadow-sm border">
                    <h2 class="text-xl font-bold mb-4">Top Leaderboard</h2>
                    <div class="space-y-4">
                        <div class="flex items-center gap-3">
                            <div class="text-yellow-500 font-bold">#1</div>
                            <div class="w-10 h-10 rounded-full bg-yellow-100 flex items-center justify-center">S</div>
                            <span class="font-bold">Salma</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="bg-white p-8 rounded-3xl shadow-sm border">
                <h2 class="text-xl font-bold mb-4">Komunitas</h2>
                <p class="text-gray-500 text-sm italic">"Baru saja selesai workout, semangat semuanya! 🔥"</p>
            </div>
        </section>
    </main>

    <script>
        function showSection(id) {
            document.getElementById('landing').style.display = id === 'landing' ? 'block' : 'none';
            document.getElementById('dashboard').style.display = id === 'dashboard' ? 'block' : 'none';
        }
    </script>
</body>
</html>
